# Offline / air-gapped overlay — mount weights you already have on disk instead of
# pulling from Hugging Face. Zero network egress for the model. Usage:
#
#   MODEL_PATH=/abs/path/to/weights \
#     docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.mount.yml up
#
# This overrides the vLLM launch to read from the mounted /model directory. TP still
# auto-detects from the GPU count.
services:
  vllm:
    command:
      - >
        TP=$${TP:-$$(nvidia-smi -L 2>/dev/null | wc -l)};
        [ "$$TP" -ge 1 ] 2>/dev/null || TP=1;
        echo "[vllm] auto tensor-parallel-size=$$TP (mounted weights)";
        exec python3 -m vllm.entrypoints.openai.api_server
        --model /model
        --served-model-name ${MODEL_NAME:-nemotron-nano-9b-v2}
        --trust-remote-code
        --mamba_ssm_cache_dtype float32
        --tensor-parallel-size $$TP
        --max-model-len ${MAX_LEN:-16384}
        --host 0.0.0.0 --port 8000
    volumes:
      - ${MODEL_PATH:?set MODEL_PATH to the model weights directory}:/model:ro
