# Enforced zero-egress (issue #2) — turn "no data leaves" from a CLAIM into a CONTROL.
#
# Default-deny all egress from the corrector, then allow ONLY:
#   (a) DNS (so in-cluster service names resolve), and
#   (b) the vLLM service (the sole dependency).
# Everything else — api.openai.com, any telemetry, any exfiltration — is dropped by the CNI.
#
# Requires a CNI that enforces NetworkPolicy (Calico, Cilium, Antrea…). apply:
#   kubectl apply -f deploy/k8s/networkpolicy.yaml
# Prove it:  kubectl exec deploy/corrector -- python scripts/egress_check.py
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: corrector-egress-lockdown
  labels: { app: corrector }
spec:
  podSelector:
    matchLabels: { app: corrector }
  policyTypes: ["Egress"]
  egress:
    # (a) DNS — UDP+TCP 53 to kube-dns
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels: { k8s-app: kube-dns }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
    # (b) the vLLM model server — the ONLY app dependency
    - to:
        - podSelector:
            matchLabels: { app: vllm }
      ports:
        - { protocol: TCP, port: 8000 }
  # NOTE: no rule allows the public internet -> all other egress is DENIED.
---
# Belt-and-suspenders: default-deny egress for the whole namespace (opt-in; scope to your ns).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
spec:
  podSelector: {}
  policyTypes: ["Egress"]
  egress: []   # deny all; specific allows above re-open only what's needed
