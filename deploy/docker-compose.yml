# On-prem corrector — one-host deploy (vLLM + corrector API).
#
# ZERO-PREP DEFAULT: clone → up. vLLM PULLS the model from Hugging Face on first start
# (Nemotron-Nano-9B is ungated — no token needed) and caches it in the `hfcache` volume,
# so restarts don't re-download. tensor-parallel-size AUTO-DETECTS your GPU count.
#
#   docker compose -f deploy/docker-compose.yml up --build
#   # corrector API → http://localhost:5244   ·   vLLM → http://localhost:8000
#
# Air-gapped / offline (weights already on disk, no egress)? Mount them instead:
#   MODEL_PATH=/abs/path/to/weights \
#     docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.mount.yml up
#
# Knobs (all optional): MODEL_ID (HF repo), MODEL_NAME (served id), MAX_LEN, TP (pin
# tensor-parallel-size instead of auto), HF_TOKEN (only for gated models).
# Needs the NVIDIA Container Toolkit on the host (GPU passthrough).
services:
  vllm:
    image: vllm/vllm-openai:latest
    # Auto-detect GPU count → tensor-parallel-size. `nvidia-smi -L` is injected by the
    # NVIDIA runtime; fall back to 1 if it's unavailable. Override by setting TP.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        TP=$${TP:-$$(nvidia-smi -L 2>/dev/null | wc -l)};
        [ "$$TP" -ge 1 ] 2>/dev/null || TP=1;
        echo "[vllm] auto tensor-parallel-size=$$TP";
        exec python3 -m vllm.entrypoints.openai.api_server
        --model ${MODEL_ID:-nvidia/NVIDIA-Nemotron-Nano-9B-v2}
        --served-model-name ${MODEL_NAME:-nemotron-nano-9b-v2}
        --trust-remote-code
        --mamba_ssm_cache_dtype float32
        --tensor-parallel-size $$TP
        --max-model-len ${MAX_LEN:-16384}
        --host 0.0.0.0 --port 8000
    volumes:
      - hfcache:/root/.cache/huggingface   # cache pulled weights across restarts
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}   # only needed for GATED models
    ports:
      - "8000:8000"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all           # expose every GPU; TP auto-detects from this
              capabilities: [gpu]
    healthcheck:
      # Use python3 (always present in the vLLM image) — NOT curl, which it may not ship.
      # Verifies identity: the endpoint serves OUR model, not just that a port is open.
      test: ["CMD", "python3", "-c", "import urllib.request,sys; sys.exit(0 if '${MODEL_NAME:-nemotron-nano-9b-v2}' in urllib.request.urlopen('http://localhost:8000/v1/models').read().decode() else 1)"]
      interval: 30s
      timeout: 5s
      retries: 60
      start_period: 600s          # first run also downloads ~17GB of weights

  corrector:
    image: onprem-corrector:latest   # pre-build with `docker build` (classic builder, no buildx needed)
    build:
      context: ..                 # repo root (so the Dockerfile can COPY app/ + sample/)
      dockerfile: deploy/Dockerfile
    environment:
      VLLM_BASE_URL: http://vllm:8000/v1   # talks to the vLLM service by name
      MODEL_NAME: ${MODEL_NAME:-nemotron-nano-9b-v2}
      POLICY_DIR: /data/policy_store
      API_PORT: 5244
      AUDIT_DIR: /data/audit_store              # tamper-evident audit log persists here
      AUDIT_STORE_MODE: ${AUDIT_STORE_MODE:-redacted}
      AUDIT_RETENTION_DAYS: ${AUDIT_RETENTION_DAYS:-0}
      AUDIT_API_KEY: ${AUDIT_API_KEY:-}         # set to enable the /v1/audit* read endpoints
    volumes:
      - corrector_policy:/data/policy_store   # Chroma index survives restarts
      - corrector_audit:/data/audit_store     # audit chain survives restarts (compliance evidence)
    ports:
      - "5244:5244"
    depends_on:
      vllm:
        condition: service_healthy

volumes:
  hfcache:            # Hugging Face weight cache (populated on first `up`)
  corrector_policy:   # Chroma policy index
  corrector_audit:    # tamper-evident audit chain (compliance evidence)
